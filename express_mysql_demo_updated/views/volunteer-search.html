<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Volunteers - VolunteerHub</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="logo">VolunteerHub</a>
            <ul class="nav-links">
                <li><a href="/volunteers">Volunteers</a></li>
                <li><a href="/volunteer-register.html">Register</a></li>
                <li><a href="/volunteer-search.html">Search</a></li>
                <li><a href="/logout">Logout</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container">
        <div class="card">
            <h1>Search Volunteers</h1>
            <div class="form-group" style="display: flex; gap: 1rem; align-items: center;">
                <input type="text" id="searchInput" placeholder="Search by first name" style="flex: 1;">
                <button id="searchBtn" class="btn" style="width: auto;">Search</button>
                <button id="clearBtn" class="btn btn-secondary" style="width: auto;">Clear</button>
            </div>
            
            <table class="table" id="searchTable" style="display: none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                    </tr>
                </thead>
                <tbody id="searchResults"></tbody>
            </table>
            <p id="noResults" style="display: none; text-align: center; padding: 2rem; color: #666;">Enter keyword to search</p>
        </div>
        <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
    </main>

    <script src="/volunteer-search.js"></script>
</body>
</html>
